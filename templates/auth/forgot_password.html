{% extends "base.html" %}
{% block title %}Forgot Password — RAKSHAK{% endblock %}

{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse at 50% 30%, rgba(220,38,38,0.07) 0%, transparent 60%);">
  <div style="width:100%;max-width:440px;">
    <div class="text-center mb-4">
      <div style="font-family:var(--font-display);font-size:2.5rem;font-weight:800;color:var(--red-primary);">🛡 RAKSHAK</div>
      <p style="color:var(--text-muted);font-size:0.9rem;">Security-based password recovery</p>
    </div>

    <div class="glass-card p-4 p-md-5">
      <!-- Step indicators -->
      <div class="d-flex gap-2 mb-4">
        <div class="step-dot active" id="dot-1">1</div>
        <div style="flex:1;height:2px;background:var(--border-glass);margin:auto;border-radius:2px;" id="line-1-2"></div>
        <div class="step-dot" id="dot-2">2</div>
        <div style="flex:1;height:2px;background:var(--border-glass);margin:auto;border-radius:2px;" id="line-2-3"></div>
        <div class="step-dot" id="dot-3">3</div>
      </div>

      <!-- Step 1: Email -->
      <div id="step-1">
        <h3 style="font-family:var(--font-display);font-size:1.5rem;margin-bottom:1rem;">Find your account</h3>
        <div class="mb-3">
          <label class="form-label-dark">Email Address</label>
          <input type="email" id="fp-email" class="form-control form-control-dark" placeholder="you@example.com">
        </div>
        <button onclick="step1()" class="btn-rakshak w-100">Next <i class="bi bi-arrow-right"></i></button>
      </div>

      <!-- Step 2: Security Question -->
      <div id="step-2" style="display:none;">
        <h3 style="font-family:var(--font-display);font-size:1.5rem;margin-bottom:1rem;">Security Question</h3>
        <div class="glass-card-red p-3 mb-3">
          <p id="security-question-text" style="margin:0;color:var(--text-primary);font-weight:500;"></p>
        </div>
        <div class="mb-3">
          <label class="form-label-dark">Your Answer</label>
          <input type="text" id="fp-answer" class="form-control form-control-dark" placeholder="Your security answer">
        </div>
        <button onclick="step2()" class="btn-rakshak w-100">Verify <i class="bi bi-check-circle"></i></button>
      </div>

      <!-- Step 3: New Password -->
      <div id="step-3" style="display:none;">
        <h3 style="font-family:var(--font-display);font-size:1.5rem;margin-bottom:1rem;">New Password</h3>
        <div class="mb-3">
          <label class="form-label-dark">New Password *</label>
          <input type="password" id="fp-newpwd" class="form-control form-control-dark" placeholder="Min 8 chars, upper, digit, special">
        </div>
        <div class="mb-4">
          <label class="form-label-dark">Confirm Password *</label>
          <input type="password" id="fp-confirmpwd" class="form-control form-control-dark" placeholder="Repeat new password">
        </div>
        <button onclick="step3()" class="btn-rakshak w-100">Reset Password <i class="bi bi-lock-fill"></i></button>
      </div>

      <hr class="glow-line">
      <p class="text-center" style="color:var(--text-secondary);font-size:0.9rem;margin:0;">
        Remember your password? <a href="{{ url_for('auth.login') }}" style="color:var(--red-primary);text-decoration:none;font-weight:600;">Back to Login</a>
      </p>
    </div>
  </div>
</div>

<style>
.step-dot {
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:0.85rem;font-weight:700;background:var(--bg-card);border:1px solid var(--border-glass);
  color:var(--text-muted);flex-shrink:0;transition:all 0.3s;
}
.step-dot.active { background:var(--red-primary);border-color:var(--red-primary);color:#fff; }
.step-dot.done   { background:rgba(72,187,120,0.2);border-color:var(--accent-green);color:var(--accent-green); }
</style>

<script>
const CSRF = '{{ csrf_token() }}';
function setStep(n) {
  [1,2,3].forEach(i => {
    document.getElementById('step-'+i).style.display = i===n ? 'block' : 'none';
    const dot = document.getElementById('dot-'+i);
    dot.className = 'step-dot' + (i<n?' done':i===n?' active':'');
  });
}

async function step1() {
  const email = document.getElementById('fp-email').value.trim();
  if (!email) return showToast('Enter your email.', 'error');
  showLoading('Looking up account...');
  const fd = new FormData();
  fd.append('step','1'); fd.append('email',email); fd.append('csrf_token',CSRF);
  const res = await fetch('/auth/forgot-password', {method:'POST',body:fd});
  const data = await res.json();
  hideLoading();
  if (data.success) {
    document.getElementById('security-question-text').textContent = data.question;
    setStep(2);
  } else showToast(data.error||'Not found', 'error');
}

async function step2() {
  const answer = document.getElementById('fp-answer').value.trim();
  if (!answer) return showToast('Enter your answer.', 'error');
  showLoading('Verifying...');
  const fd = new FormData();
  fd.append('step','2'); fd.append('security_answer',answer); fd.append('csrf_token',CSRF);
  const res = await fetch('/auth/forgot-password', {method:'POST',body:fd});
  const data = await res.json();
  hideLoading();
  if (data.success) { showToast('Identity verified!', 'success'); setStep(3); }
  else showToast(data.error||'Incorrect answer', 'error');
}

async function step3() {
  const p = document.getElementById('fp-newpwd').value;
  const c = document.getElementById('fp-confirmpwd').value;
  if (p !== c) return showToast('Passwords do not match.', 'error');
  showLoading('Resetting password...');
  const fd = new FormData();
  fd.append('step','3'); fd.append('new_password',p); fd.append('csrf_token',CSRF);
  const res = await fetch('/auth/forgot-password', {method:'POST',body:fd});
  const data = await res.json();
  hideLoading();
  if (data.success) { showToast('Password reset! Redirecting...', 'success'); setTimeout(()=>window.location.href=data.redirect,1000); }
  else showToast(data.error||'Reset failed', 'error');
}
</script>
{% endblock %}
