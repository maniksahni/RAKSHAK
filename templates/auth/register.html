{% extends "base.html" %}
{% block title %}Register — RAKSHAK{% endblock %}

{% block extra_css %}
<style>
/* ── Immersive Auth Background ── */
.auth-bg {
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
  background: radial-gradient(circle at 50% 100%, rgba(220, 38, 38, 0.1) 0%, #050508 60%);
  position: relative; overflow: hidden; perspective: 1000px;
}
.auth-bg::before, .auth-bg::after {
  content: ''; position: absolute; border-radius: 50%;
  pointer-events: none; mix-blend-mode: screen;
}
.auth-bg::before {
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(220, 38, 38, 0.08) 0%, transparent 70%);
  top: -200px; left: -200px; animation: drift 15s ease-in-out infinite alternate;
}
.auth-bg::after {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(220, 38, 38, 0.04) 0%, transparent 60%);
  bottom: -150px; right: -150px; animation: drift 20s ease-in-out 3s infinite alternate-reverse;
}

@keyframes drift {
  0% { transform: translate(0, 0) scale(1) rotate(0deg); }
  100% { transform: translate(60px, 40px) scale(1.1) rotate(15deg); }
}

/* 3D Grid floor */
.grid-floor {
  position: absolute; inset: 0; top: 50%; bottom: -50%;
  background-image: 
    linear-gradient(rgba(220, 38, 38, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(220, 38, 38, 0.08) 1px, transparent 1px);
  background-size: 80px 80px;
  transform-origin: center top;
  transform: perspective(1000px) rotateX(75deg) translateY(0);
  animation: gridMove 20s linear infinite;
  mask-image: linear-gradient(to top, black, transparent 80%);
  -webkit-mask-image: linear-gradient(to top, black, transparent 80%);
  pointer-events: none;
}
@keyframes gridMove {
  from { background-position: 0 0; }
  to { background-position: 0 80px; }
}

/* Auth Card 3D Wrap */
.auth-card-wrap {
  width: 100%; max-width: 520px; position: relative; z-index: 5;
  transform-style: preserve-3d;
  transition: transform 0.1s ease-out; /* For 3D tilt JS */
}

/* The actual glass card */
.glass-card {
  background: rgba(10, 10, 14, 0.7);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
  position: relative; overflow: hidden;
}

/* Animated glow border inside card */
.glass-card::before {
  content:''; position: absolute; inset: -2px; z-index: -1;
  background: conic-gradient(from 0deg, transparent 60%, var(--red-primary) 80%, transparent 100%);
  border-radius: inherit;
  animation: rotateGlow 4s linear infinite;
  opacity: 0.5;
}
@keyframes rotateGlow {
  to { transform: rotate(360deg); }
}

/* Logo Enhancements */
.auth-logo {
  font-family: var(--font-display); font-size: 2.8rem; font-weight: 900;
  color: #fff; letter-spacing: 1px;
  background: linear-gradient(to bottom, #fff 20%, var(--red-primary) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 15px rgba(220,38,38,0.4));
  animation: logoBreath 4s ease-in-out infinite alternate;
}
@keyframes logoBreath {
  from { filter: drop-shadow(0 0 10px rgba(220,38,38,0.3)); }
  to { filter: drop-shadow(0 0 25px rgba(220,38,38,0.7)); }
}
.shield-icon {
  width: 64px; height: 64px; border-radius: 20px; margin: 0 auto 1.2rem;
  background: linear-gradient(135deg, rgba(220,38,38,0.15) 0%, rgba(220,38,38,0.02) 100%);
  border: 1px solid rgba(220,38,38,0.3);
  box-shadow: inset 0 0 20px rgba(220,38,38,0.1), 0 0 30px rgba(220,38,38,0.2);
  display: inline-flex; justify-content: center; align-items: center;
  font-size: 1.8rem; animation: shieldHover 4s ease-in-out infinite;
}
@keyframes shieldHover {
  0%,100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-8px) scale(1.05); }
}

/* Input Focus Glow */
.form-control-dark {
  background: rgba(255, 255, 255, 0.03) !important;
  border-color: rgba(255, 255, 255, 0.08) !important;
  transition: all 0.3s ease;
}
.form-control-dark:focus {
  background: rgba(0, 0, 0, 0.4) !important;
  border-color: var(--red-primary) !important;
  box-shadow: 0 0 0 4px rgba(220,38,38,0.15), 0 0 20px rgba(220,38,38,0.1) !important;
  transform: translateY(-2px);
}

/* Primary Button High-End */
.btn-rakshak {
  background: linear-gradient(135deg, var(--red-primary) 0%, #991b1b 100%);
  border: none; position: relative; overflow: hidden;
  box-shadow: 0 10px 20px -5px rgba(220,38,38,0.4);
  transform: translateY(0); transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  letter-spacing: 0.05em; font-weight: 600; text-transform: uppercase;
}
.btn-rakshak:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 15px 30px -5px rgba(220,38,38,0.6);
}
.btn-rakshak::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: skewX(-20deg); animation: btnSweep 3s infinite;
}
@keyframes btnSweep {
  0% { left: -100%; }
  20%, 100% { left: 200%; }
}

/* Matrix Rain Canvas */
#matrix-rain {
  position: absolute; inset: 0; z-index: 0; pointer-events: none; opacity: 0.6;
}
.grid-floor { z-index: 1; }
@keyframes lockPulse {
  0%,100%{opacity:0.5;transform:scale(1)}
  50%{opacity:1;transform:scale(1.15)}
}
@keyframes inputShake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}80%{transform:translateX(4px)}
}
.input-error { animation:inputShake .4s ease-in-out; border-color:var(--red-primary) !important; }

/* step progress indicator */
.reg-steps {display:flex;align-items:center;gap:0;margin-bottom:1.5rem;}
.reg-step-dot {
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:0.7rem;font-weight:700;background:var(--bg-card);border:2px solid var(--border-glass);
  color:var(--text-muted);flex-shrink:0;transition:all 0.4s cubic-bezier(.22,1,.36,1);position:relative;z-index:2;
}
.reg-step-dot.active {background:var(--red-primary);border-color:var(--red-primary);color:#fff;box-shadow:0 0 16px rgba(220,38,38,0.4);transform:scale(1.1);}
.reg-step-dot.done {background:rgba(72,187,120,0.2);border-color:var(--accent-green);color:var(--accent-green);}
.reg-step-line {flex:1;height:2px;background:var(--border-glass);position:relative;overflow:hidden;}
.reg-step-line-fill {position:absolute;inset:0;background:var(--accent-green);transform:scaleX(0);transform-origin:left;transition:transform .5s cubic-bezier(.22,1,.36,1);}
.reg-step-line.done .reg-step-line-fill {transform:scaleX(1);}

.divider-or {
  display:flex;align-items:center;gap:1rem;margin:1.5rem 0;
  color:var(--text-muted);font-size:0.8rem;letter-spacing:0.1em;
}
.divider-or::before,.divider-or::after {
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,var(--border-glass),transparent);
}

/* password strength bar */
.pwd-strength {height:3px;border-radius:2px;background:var(--border-glass);margin-top:6px;overflow:hidden;transition:all .3s}
.pwd-strength-fill {height:100%;border-radius:2px;width:0;transition:width .4s,background .4s}
.pwd-hint {font-size:0.7rem;color:var(--text-muted);margin-top:4px;transition:color .3s}

/* field group animation */
.field-group {
  animation:fieldIn .5s cubic-bezier(.22,1,.36,1) both;
}
.field-group:nth-child(1){animation-delay:.05s}
.field-group:nth-child(2){animation-delay:.1s}
.field-group:nth-child(3){animation-delay:.15s}
.field-group:nth-child(4){animation-delay:.2s}
.field-group:nth-child(5){animation-delay:.25s}
.field-group:nth-child(6){animation-delay:.3s}
.field-group:nth-child(7){animation-delay:.35s}
@keyframes fieldIn {from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
{% endblock %}

{% block content %}
<div class="auth-bg" id="auth-bg">
  <canvas id="matrix-rain"></canvas>
  <div class="grid-floor"></div>

  <div class="auth-card-wrap" id="auth-card">
    <div class="text-center mb-4">
      <div class="shield-icon">
        <i class="bi bi-person-plus-fill" style="color:var(--red-primary);"></i>
      </div>
      <div class="auth-logo">RAKSHAK</div>
      <p id="reg-typewriter" style="color:var(--text-muted);font-size:0.88rem;margin-top:6px;letter-spacing:0.05em;min-height:1.3em;"></p>
    </div>

    <div class="glass-card p-4 p-md-5" style="border-radius:var(--radius-xl);">
      <h2 style="font-family:var(--font-display);font-size:1.8rem;font-weight:700;margin-bottom:0.5rem;">Create Account</h2>

      <!-- Registration progress -->
      <div class="reg-steps" id="reg-steps">
        <div class="reg-step-dot active" data-step="1"><i class="bi bi-person" style="font-size:0.65rem;"></i></div>
        <div class="reg-step-line"><div class="reg-step-line-fill"></div></div>
        <div class="reg-step-dot" data-step="2"><i class="bi bi-envelope" style="font-size:0.65rem;"></i></div>
        <div class="reg-step-line"><div class="reg-step-line-fill"></div></div>
        <div class="reg-step-dot" data-step="3"><i class="bi bi-lock" style="font-size:0.65rem;"></i></div>
        <div class="reg-step-line"><div class="reg-step-line-fill"></div></div>
        <div class="reg-step-dot" data-step="4"><i class="bi bi-shield-check" style="font-size:0.65rem;"></i></div>
      </div>

      <form id="register-form" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="row g-3">
          <div class="col-12 field-group">
            <label class="form-label-dark"><i class="bi bi-person me-1" style="color:var(--red-primary);font-size:0.8rem;"></i>Full Name *</label>
            <input type="text" name="full_name" class="form-control form-control-dark" placeholder="Priya Sharma" required minlength="2">
          </div>
          <div class="col-md-6 field-group">
            <label class="form-label-dark"><i class="bi bi-envelope me-1" style="color:var(--red-primary);font-size:0.8rem;"></i>Email *</label>
            <input type="email" name="email" class="form-control form-control-dark" placeholder="you@example.com" required>
          </div>
          <div class="col-md-6 field-group">
            <label class="form-label-dark"><i class="bi bi-phone me-1" style="color:var(--red-primary);font-size:0.8rem;"></i>Phone *</label>
            <input type="tel" name="phone" class="form-control form-control-dark" placeholder="10-digit mobile" maxlength="10" required>
          </div>
          <div class="col-md-6 field-group">
            <label class="form-label-dark"><i class="bi bi-lock me-1" style="color:var(--red-primary);font-size:0.8rem;"></i>Password *</label>
            <div style="position:relative;">
              <input type="password" id="pwd" name="password" class="form-control form-control-dark" placeholder="Min 8 chars" required oninput="checkStrength(this.value)">
              <button type="button" onclick="togglePwd2('pwd')" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;transition:color .2s;" onmouseover="this.style.color='var(--red-primary)'" onmouseout="this.style.color='var(--text-muted)'">
                <i class="bi bi-eye" id="eye-pwd"></i>
              </button>
            </div>
            <div class="pwd-strength"><div class="pwd-strength-fill" id="pwd-fill"></div></div>
            <div class="pwd-hint" id="pwd-hint">Upper, lower, digit & special char required</div>
          </div>
          <div class="col-md-6 field-group">
            <label class="form-label-dark"><i class="bi bi-lock-fill me-1" style="color:var(--red-primary);font-size:0.8rem;"></i>Confirm *</label>
            <input type="password" name="confirm_password" class="form-control form-control-dark" placeholder="Repeat password" required>
          </div>
          <div class="col-12 field-group">
            <label class="form-label-dark"><i class="bi bi-question-circle me-1" style="color:var(--red-primary);font-size:0.8rem;"></i>Security Question *</label>
            <select name="security_question" class="form-control form-control-dark form-select-dark" required style="appearance:auto;">
              <option value="">Choose a question...</option>
              <option>What is your mother's maiden name?</option>
              <option>What was the name of your first pet?</option>
              <option>What city were you born in?</option>
              <option>What is your favourite teacher's name?</option>
              <option>What is your childhood nickname?</option>
            </select>
          </div>
          <div class="col-12 field-group">
            <label class="form-label-dark"><i class="bi bi-chat-left-text me-1" style="color:var(--red-primary);font-size:0.8rem;"></i>Security Answer *</label>
            <input type="text" name="security_answer" class="form-control form-control-dark" placeholder="Your answer (stored securely)" required>
          </div>
        </div>

        <button type="submit" class="btn-rakshak w-100 mt-4" id="reg-btn">
          Create Account <i class="bi bi-shield-check ms-1"></i>
        </button>
      </form>

      <div class="divider-or">OR</div>
      <p class="text-center mt-3 mb-0" style="color:var(--text-secondary);font-size:0.95rem;">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" class="ms-1" style="color:var(--red-primary);text-decoration:none;font-weight:700;transition:all .2s;position:relative;" onmouseover="this.style.textShadow='0 0 15px rgba(220,38,38,0.8)';this.style.color='#fca5a5'" onmouseout="this.style.textShadow='none';this.style.color='var(--red-primary)'">Sign in</a>
      </p>
    </div>

    <div class="text-center mt-3 d-flex align-items-center" style="justify-content:center;">
      <div style="display:flex;align-items:center;gap:6px;justify-content:center;">
        <i class="bi bi-lock-fill" style="color:rgba(72,187,120,0.6);font-size:0.7rem;animation:lockPulse 3s ease-in-out infinite;"></i>
        <span style="color:var(--text-muted);font-size:0.72rem;letter-spacing:0.08em;">SECURED WITH AES-256 ENCRYPTION</span>
        <span style="width:4px;height:4px;border-radius:50%;background:var(--accent-green);animation:statusBlink 2s infinite;"></span>
      </div>
    </div>
  </div>
</div>

<script>
/* typewriter effect */
(function(){
  const el = document.getElementById('reg-typewriter');
  if (!el) return;
  const phrases = [
    'Join the safety network today',
    'Advanced protection awaits you',
    'Your safety is our priority',
    'One account, complete protection'
  ];
  let phraseIdx = 0, charIdx = 0, deleting = false;
  function type() {
    const phrase = phrases[phraseIdx];
    if (!deleting) {
      el.textContent = phrase.substring(0, charIdx+1);
      charIdx++;
      if (charIdx === phrase.length) { setTimeout(() => { deleting = true; type(); }, 2500); return; }
      setTimeout(type, 45);
    } else {
      el.textContent = phrase.substring(0, charIdx);
      charIdx--;
      if (charIdx < 0) { deleting = false; phraseIdx = (phraseIdx+1) % phrases.length; charIdx = 0; setTimeout(type, 400); return; }
      setTimeout(type, 25);
    }
  }
  type();
})();

/* Matrix Rain Effect */
(function(){
  const canvas = document.getElementById('matrix-rain');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let width = canvas.width = window.innerWidth;
  let height = canvas.height = window.innerHeight;
  
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%.&*+=-_|<>'.split('');
  const fontSize = 14;
  const numColumns = Math.floor(width / fontSize) + 1;
  const columns = Array(numColumns).fill(0).map(() => Math.floor(Math.random() * -100));
  
  window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  });

  function draw() {
    ctx.fillStyle = 'rgba(5, 5, 8, 0.15)'; // Trail length
    ctx.fillRect(0, 0, width, height);
    
    // Draw columns
    ctx.fillStyle = '#dc2626'; // primary red
    ctx.font = fontSize + 'px monospace';
    
    columns.forEach((y, i) => {
      // Glow on the leading character
      const char = chars[Math.floor(Math.random() * chars.length)];
      const x = i * fontSize;
      ctx.fillText(char, x, y);
      
      // Randomly reset column to top
      if (y > height && Math.random() > 0.98) {
        columns[i] = 0;
      } else {
        columns[i] = y + fontSize;
      }
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* 3D Tilt Effect on mousemove */
(function() {
  const bg = document.getElementById('auth-bg');
  const card = document.getElementById('auth-card');
  if(!bg || !card) return;
  
  bg.addEventListener('mousemove', (e) => {
    const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
    const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
    card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
  });
  
  bg.addEventListener('mouseleave', () => {
    card.style.transform = `rotateY(0deg) rotateX(0deg)`;
  });
})();

/* step progress tracker */
function updateRegSteps() {
  const form = document.getElementById('register-form');
  const dots = document.querySelectorAll('.reg-step-dot');
  const lines = document.querySelectorAll('.reg-step-line');
  const name = form.querySelector('[name="full_name"]').value.trim();
  const email = form.querySelector('[name="email"]').value.trim();
  const phone = form.querySelector('[name="phone"]').value.trim();
  const pwd = form.querySelector('[name="password"]').value;
  const confirm = form.querySelector('[name="confirm_password"]').value;
  const sq = form.querySelector('[name="security_question"]').value;
  const sa = form.querySelector('[name="security_answer"]').value.trim();
  let step = 1;
  if (name.length >= 2) step = 2;
  if (step >= 2 && email.includes('@') && phone.length >= 10) step = 3;
  if (step >= 3 && pwd.length >= 8 && confirm === pwd) step = 4;
  if (step >= 4 && sq && sa.length >= 1) step = 5;
  dots.forEach((d, i) => {
    const s = i + 1;
    d.className = 'reg-step-dot' + (s < step ? ' done' : s === step ? ' active' : '');
  });
  lines.forEach((l, i) => {
    l.className = 'reg-step-line' + (i + 1 < step ? ' done' : '');
  });
}
document.getElementById('register-form').addEventListener('input', updateRegSteps);
setTimeout(updateRegSteps, 100);

/* password strength meter */
function checkStrength(v) {
  const fill = document.getElementById('pwd-fill');
  const hint = document.getElementById('pwd-hint');
  let s = 0;
  if (v.length >= 8) s++;
  if (/[A-Z]/.test(v)) s++;
  if (/[a-z]/.test(v)) s++;
  if (/[0-9]/.test(v)) s++;
  if (/[^A-Za-z0-9]/.test(v)) s++;
  const pct = (s/5)*100;
  fill.style.width = pct+'%';
  if (s <= 2) { fill.style.background='var(--red-primary)'; hint.textContent='Weak'; hint.style.color='var(--red-primary)'; }
  else if (s <= 3) { fill.style.background='var(--accent-amber)'; hint.textContent='Fair'; hint.style.color='var(--accent-amber)'; }
  else if (s <= 4) { fill.style.background='var(--accent-blue)'; hint.textContent='Good'; hint.style.color='var(--accent-blue)'; }
  else { fill.style.background='var(--accent-green)'; hint.textContent='Strong'; hint.style.color='var(--accent-green)'; }
  if (!v) { fill.style.width='0'; hint.textContent='Upper, lower, digit & special char required'; hint.style.color='var(--text-muted)'; }
}

function togglePwd2(id) {
  const inp = document.getElementById(id);
  const eye = document.getElementById('eye-'+id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  eye.className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}

document.getElementById('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';
  showLoading('Creating your account...');

  const fd = new FormData(this);
  try {
    const res = await fetch('/auth/register', { method:'POST', body:fd });
    const data = await res.json();
    if (data.success) {
      showToast('Account created! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = data.redirect, 1000);
    } else {
      (data.errors||['Registration failed']).forEach(e => showToast(e, 'error'));
      document.querySelectorAll('.form-control-dark').forEach(inp => {
        inp.classList.add('input-error');
        setTimeout(() => inp.classList.remove('input-error'), 500);
      });
      btn.disabled = false;
      btn.innerHTML = 'Create Account <i class="bi bi-shield-check ms-1"></i>';
    }
  } catch(err) {
    showToast('Network error. Please try again.', 'error');
    btn.disabled = false;
    btn.innerHTML = 'Create Account <i class="bi bi-shield-check ms-1"></i>';
  } finally {
    hideLoading();
  }
});
</script>
{% endblock %}
