databases:
  - name: rakshak-db
    plan: free
    databaseName: rakshak
    user: rakshak

services:
  - type: web
    name: rakshak
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rakshak-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.6"
